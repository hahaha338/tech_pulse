name: TechPulse Weekly Push

on:
  schedule:
    # 每周一北京时间 10:00（UTC 02:00）
    - cron: "0 2 * * 1"
  workflow_dispatch: # 允许手动触发

# 允许 workflow 写入仓库（用于 GitHub Pages 部署）
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TechPulse
        env:
          TECHPULSE_SMTP_PASSWORD: ${{ secrets.TECHPULSE_SMTP_PASSWORD }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python main.py

      - name: Commit new report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: add report $(date +%Y-%m-%d)"
          git push origin main

      - name: Build website
        run: python build_web.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: "chore: update site [${{ github.run_number }}]"
