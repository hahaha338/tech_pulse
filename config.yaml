      category: "oem"
      type: "rss"
      url: "https://www.androidauthority.com/feed"

    - name: "9to5Google"
      category: "oem"
      type: "rss"
      url: "https://9to5google.com/feed/"

    - name: "9to5Mac"
      category: "oem"
      type: "rss"
      url: "https://9to5mac.com/feed/"

    - name: "The Verge"
      category: "tech"
      type: "rss"
      url: "https://www.theverge.com/rss/index.xml"

    - name: "DPReview"
      category: "tech"
      type: "rss"
      url: "https://www.dpreview.com/feeds/news.xml"

    - name: "PetaPixel"
      category: "tech"
      type: "rss"
      url: "https://petapixel.com/feed/"

    # 国内技术博客 / 数码媒体 RSS：补充微信公众号、知乎之外的可订阅来源
    - name: "IT之家"
      category: "oem"
      type: "rss"
      url: "https://www.ithome.com/rss/"

    - name: "少数派"
      category: "oem"
      type: "rss"
      url: "https://sspai.com/feed"

    - name: "爱范儿"
      category: "oem"
      type: "rss"
      url: "https://www.ifanr.com/feed"

    - name: "雷峰网"
      category: "tech"
      type: "rss"
      url: "https://www.leiphone.com/feed"

    # 通用影像技术趋势
    - name: "Google News - Computational Photography"
      category: "tech"
      query: "(computational photography OR mobile imaging OR AI imaging OR neural ISP OR HDR imaging OR image sensor) when:7d -review -comparison -price"

    - name: "Google News - Image Sensor Tech"
      category: "tech"
      query: "(image sensor OR camera sensor OR stacked sensor OR LOFIC OR LYTIA OR ISOCELL OR OmniVision) (smartphone OR mobile OR camera) when:7d -review -comparison -price"

    - name: "Google News - Neural ISP AI Imaging"
      category: "tech"
      query: "(neural ISP OR AI ISP OR AI image processing OR low light enhancement OR HDR video OR computational imaging) when:7d -review -comparison -price"

    # 手机厂商影像技术趋势
    - name: "Google News - OEM Imaging Tech"
      category: "oem"
      query: "(Apple OR iPhone OR Samsung OR Galaxy OR Xiaomi OR OPPO OR vivo OR Huawei OR HONOR OR Pixel) (camera sensor OR imaging technology OR AI camera OR computational photography OR periscope telephoto OR HDR OR ISP) when:7d -\"camera review\" -\"phone review\" -DxOMark"

    - name: "Google News - Apple Pixel Imaging"
      category: "oem"
      query: "(iPhone OR Apple OR Google Pixel OR Pixel) (computational photography OR camera sensor OR AI camera OR HDR OR image processing OR night mode) when:7d -\"camera review\" -\"phone review\" -DxOMark"

    - name: "Google News - Samsung Xiaomi OPPO Vivo Imaging"
      category: "oem"
      query: "(Samsung OR Galaxy OR Xiaomi OR OPPO OR vivo) (camera sensor OR periscope telephoto OR variable aperture OR AI imaging OR HDR OR ISP OR LOFIC OR LYTIA) when:7d -\"camera review\" -DxOMark"

    - name: "Google News - Huawei HONOR Imaging China"
      category: "oem"
      query: "(华为 OR 荣耀 OR Huawei OR HONOR) (影像 OR 相机 OR 摄像头 OR 拍照 OR 镜头 OR 长焦 OR 潜望 OR 主摄 OR 传感器 OR 可变光圈 OR HDR OR AI影像 OR 计算摄影 OR XMAGE OR 雅顾) when:7d -评测 -对比 -榜单 -推荐 -降价"
      hl: "zh-CN"
      gl: "CN"
      ceid: "CN:zh-Hans"

    - name: "Google News - Xiaomi OPPO vivo Imaging China"
      category: "oem"
      query: "(小米 OR OPPO OR vivo OR Xiaomi) (影像 OR 相机 OR 摄像头 OR 拍照 OR 镜头 OR 长焦 OR 潜望 OR 主摄 OR 传感器 OR 计算摄影 OR AI影像 OR 蓝图影像 OR 徕卡 OR 哈苏 OR 蔡司 OR LYTIA OR LOFIC) when:7d -评测 -对比 -榜单 -推荐 -降价"
      hl: "zh-CN"
      gl: "CN"
      ceid: "CN:zh-Hans"

    - name: "Google News - OEM Imaging Tech China"
      category: "oem"
      query: "(华为 OR 小米 OR OPPO OR vivo OR 荣耀 OR 苹果 OR 三星 OR Huawei OR HONOR OR Xiaomi) (影像技术 OR 影像系统 OR 传感器 OR 长焦 OR 潜望 OR HDR OR AI影像 OR 计算摄影 OR 徕卡 OR 哈苏 OR 蔡司 OR LYTIA OR LOFIC) when:7d -评测 -对比 -榜单 -推荐 -降价"
      hl: "zh-CN"
      gl: "CN"
      ceid: "CN:zh-Hans"

    # 传感器供应商 / 上游技术
    - name: "Google News - Mobile Sensor Vendors"
      category: "oem"
      query: "(Sony LYTIA OR Samsung ISOCELL OR OmniVision) (smartphone camera sensor OR image sensor OR stacked sensor OR HDR OR LOFIC) when:7d -review -comparison -price"

