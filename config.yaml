# =================== External Trends ===================
external:
  # 只看最近内容，避免混入旧新闻、旧发布、榜单、旧评测
  lookback_days: 7
  max_items_per_source: 5
  max_items_total: 30
  max_report_items_per_section: 10

  tech_keywords:
    - "mobile imaging"
    - "computational photography"
    - "image sensor"
    - "camera sensor"
    - "HDR"
    - "autofocus"
    - "AI imaging"
    - "neural ISP"
    - "low light"
    - "super resolution"
    - "计算摄影"
    - "手机影像"
    - "影像算法"
    - "图像传感器"
    - "神经网络 ISP"

  tech_exclude_keywords:
    - "legal evidence"
    - "colonoscopy"
    - "satellite"
    - "pose estimation"
    - "world model"
    - "buying guide"
    - "still-life"
    - "lens"
    - "lenses"
    - "photographer"
    - "camera review"
    - "screen-free camera"
    - "drone"
    - "drones"
    - "explosive"
    - "payload"
    - "defense"
    - "cinema"
    - "digital cinema"
    - "venice"
    - "x-ray"
    - "wearable"

  oem_brands:
    - "Apple"
    - "iPhone"
    - "Samsung"
    - "Galaxy"
    - "Xiaomi"
    - "OPPO"
    - "vivo"
    - "Huawei"
    - "HONOR"
    - "Google Pixel"
    - "Pixel"
    - "Sony LYTIA"
    - "Samsung ISOCELL"
    - "OmniVision"
    - "苹果"
    - "三星"
    - "小米"
    - "OPPO"
    - "vivo"
    - "华为"
    - "荣耀"
    - "索尼"

  # 手机厂商影像趋势必须命中这些技术词之一，避免只抓到榜单/评测/促销
  # 原则：要求具体的技术概念，不接受"拍照"/"相机"/"影像"等泛义词
  oem_keywords:
    # --- 英文技术术语 ---
    - "camera module"
    - "camera sensor"
    - "image sensor"
    - "imaging technology"
    - "computational photography"
    - "image processing"
    - "AI imaging"
    - "neural ISP"
    - "HDR"
    - "ISP"
    - "periscope"
    - "periscope telephoto"
    - "variable aperture"
    - "LYTIA"
    - "LOFIC"
    - "portrait engine"
    - "ISOCELL"
    - "OmniVision"
    - "stacked sensor"
    - "under-display camera"
    - "sensor-shift OIS"
    - "PDAF"
    - "ToF sensor"
    - "autofocus system"
    - "multi-camera"
    - "camera architecture"
    - "imaging pipeline"
    - "night algorithm"
    - "low light algorithm"
    # --- 中文技术术语（要求具体，不接受泛义词）---
    - "影像技术"
    - "影像系统"
    - "影像算法"
    - "影像芯片"
    - "影像处理器"
    - "传感器"
    - "图像传感器"
    - "堆叠传感器"
    - "计算摄影"
    - "AI影像"
    - "AI拍照"
    - "ISP算法"
    - "神经网络ISP"
    - "潜望"
    - "可变光圈"
    - "长焦模组"
    - "长焦镜头"
    - "主摄传感器"
    - "人像引擎"
    - "夜景算法"
    - "夜景模式"
    - "蓝图影像"
    - "XMAGE"
    - "徕卡"
    - "哈苏"
    - "蔡司"
    - "影像旗舰芯片"
    - "感光元件"
    - "光学防抖"
    - "相位对焦"
    - "多摄协同"

  oem_exclude_keywords:
    # --- 消费评测/对比/榜单类 ---
    - "best camera phone"
    - "best android phone"
    - "best smartphones"
    - "camera phone for photography"
    - "camera comparison"
    - "camera review"
    - "phone review"
    - "full review"
    - "review"
    - "comparison"
    - "compared"
    - " vs "
    - " vs."
    - "versus"
    - "battle of"
    - "dxomark"
    - "benchmark"
    - "hands-on"
    - "first look"
    - "unboxing"
    - "sample shots"
    - "sample photos"
    - "photo samples"
    - "camera test"
    - "camera samples"
    - "shot on"
    # --- 促销/价格/购买 ---
    - "price"
    - "deal"
    - "discount"
    - "buy now"
    - "pre-order"
    - "sale"
    - "offer"
    - "降价"
    - "优惠"
    - "折扣"
    - "限时"
    - "抢购"
    - "购买"
    - "价格"
    - "发售价"
    # --- 消费体验/样张类 ---
    - "拍摄样张"
    - "拍照样张"
    - "实拍"
    - "样张"
    - "外观"
    - "手感"
    - "开箱"
    - "体验报告"
    - "上手体验"
    - "评测"
    - "对比"
    - "榜单"
    - "推荐"
    - "选购"
    # --- 其他非相机内容 ---
    - "oled"
    - "tv"
    - "display"
    - "screen"
    - "matte display"
    - "pad "
    - "tablet"
    - "accessories"
    - "robotics"
    - "showroom"
    - "certification"
    - "monitor"
    - "projector"
    - "home appliance"
    - "photos app"
    - "apple photos"
    - "google photos"
    - "gallery"
    - "photo gallery"
    - "album"
    - "albums"
    - "stickers"
    - "wallpaper"
    - "icons"
    - "designs reportedly"
    - "camera bump"
    - "compact camera"
    - "android app"
    - "ultrawide displays"

  rss_sources:
    # 论文 / 学术趋势
    - name: "arXiv CV"
      category: "tech"
      type: "rss"
      url: "https://arxiv.org/rss/cs.CV"

    # 专业传感器 / 半导体技术媒体
    - name: "Image Sensors World"
      category: "tech"
      type: "rss"
      url: "https://image-sensors-world.blogspot.com/feeds/posts/default"

    - name: "EETimes - Image Sensor"
      category: "tech"
      query: "(image sensor OR camera sensor OR CMOS sensor OR stacked sensor OR BSI sensor OR pixel binning OR HDR sensor OR ToF sensor) when:7d -review -comparison -price"

    - name: "Google News - IEEE ISSCC Imaging"
      category: "tech"
      query: "(ISSCC OR IEDM OR VLSI) (image sensor OR camera sensor OR CMOS image sensor OR HDR OR stacked sensor) when:30d -review"

    # 手机厂商 / 上游厂商官网：优先级高于 Google News
    - name: "Apple Newsroom"
      category: "oem"
      type: "rss"
      url: "https://www.apple.com/newsroom/rss-feed.rss"

    - name: "Samsung Global Newsroom"
      category: "oem"
      type: "rss"
      url: "https://news.samsung.com/global/feed"

    - name: "Google Pixel Blog"
      category: "oem"
      type: "rss"
      url: "https://blog.google/products/pixel/rss/"

    - name: "Xiaomi Global Newsroom"
      category: "oem"
      type: "html"
      url: "https://www.mi.com/global/discover/newsroom"

    - name: "OPPO Newsroom"
      category: "oem"
      type: "html"
      url: "https://www.oppo.com/en/newsroom/"

    - name: "vivo News"
      category: "oem"
      type: "html"
      url: "https://www.vivo.com/en/about-vivo/news"

    - name: "Huawei Consumer News"
      category: "oem"
      type: "html"
      url: "https://consumer.huawei.com/en/press/news/"

    - name: "HONOR News"
      category: "oem"
      type: "html"
      url: "https://www.honor.com/global/news/"

    - name: "Sony Semiconductor News"
      category: "oem"
      type: "html"
      url: "https://www.sony-semicon.com/en/news/"

    - name: "Samsung Semiconductor Newsroom"
      category: "oem"
      type: "html"
      url: "https://semiconductor.samsung.com/newsroom/news/"

    # 国外手机 / 影像技术媒体 RSS：不只依赖 Google News
    - name: "Android Authority"
      category: "oem"
      type: "rss"
      url: "https://www.androidauthority.com/feed"

    - name: "9to5Google"
      category: "oem"
      type: "rss"
      url: "https://9to5google.com/feed/"

    - name: "9to5Mac"
      category: "oem"
      type: "rss"
      url: "https://9to5mac.com/feed/"

    - name: "The Verge"
      category: "tech"
      type: "rss"
      url: "https://www.theverge.com/rss/index.xml"

    - name: "DPReview"
      category: "tech"
      type: "rss"
      url: "https://www.dpreview.com/feeds/news.xml"

    - name: "PetaPixel"
      category: "tech"
      type: "rss"
      url: "https://petapixel.com/feed/"

    # 国内技术博客 / 数码媒体 RSS：补充微信公众号、知乎之外的可订阅来源
    - name: "IT之家"
      category: "oem"
      type: "rss"
      url: "https://www.ithome.com/rss/"

    - name: "少数派"
      category: "oem"
      type: "rss"
      url: "https://sspai.com/feed"

    - name: "爱范儿"
      category: "oem"
      type: "rss"
      url: "https://www.ifanr.com/feed"

    - name: "雷峰网"
      category: "tech"
      type: "rss"
      url: "https://www.leiphone.com/feed"

    # 通用影像技术趋势
    - name: "Google News - Computational Photography"
      category: "tech"
      query: "(computational photography OR mobile imaging OR AI imaging OR neural ISP OR HDR imaging OR image sensor) when:7d -review -comparison -price -\"sample shots\" -\"photo samples\""

    - name: "Google News - Image Sensor Tech"
      category: "tech"
      query: "(image sensor OR camera sensor OR stacked sensor OR LOFIC OR LYTIA OR ISOCELL OR OmniVision) (smartphone OR mobile) when:7d -review -comparison -price"

    - name: "Google News - Neural ISP AI Imaging"
      category: "tech"
      query: "(neural ISP OR AI ISP OR AI image processing OR low light enhancement OR HDR video OR computational imaging OR imaging pipeline OR image signal processor) when:7d -review -comparison -price"

    # 手机厂商影像技术趋势（英文）——要求具体技术词，排除评测/样张/价格
    - name: "Google News - OEM Imaging Tech"
      category: "oem"
      query: "(Apple OR iPhone OR Samsung OR Galaxy OR Xiaomi OR OPPO OR vivo OR Huawei OR HONOR OR Pixel) (camera sensor OR imaging technology OR computational photography OR periscope telephoto OR variable aperture OR ISP OR LOFIC OR LYTIA OR ISOCELL OR stacked sensor OR image signal processor) when:7d -\"camera review\" -\"phone review\" -DxOMark -\"hands-on\" -\"sample\" -price"

    - name: "Google News - Apple Pixel Imaging"
      category: "oem"
      query: "(iPhone OR Apple OR Google Pixel OR Pixel) (computational photography OR camera sensor OR image signal processor OR neural ISP OR HDR algorithm OR image processing OR stacked sensor OR sensor-shift OIS) when:7d -\"camera review\" -\"phone review\" -DxOMark -\"hands-on\" -price"

    - name: "Google News - Samsung Xiaomi OPPO Vivo Imaging"
      category: "oem"
      query: "(Samsung OR Galaxy OR Xiaomi OR OPPO OR vivo) (camera sensor OR periscope telephoto OR variable aperture OR ISP OR LOFIC OR LYTIA OR ISOCELL OR stacked sensor OR imaging technology OR camera module) when:7d -\"camera review\" -DxOMark -\"hands-on\" -\"sample\" -price"

    # 手机厂商影像技术趋势（中文）——要求具体技术词，排除评测/样张/体验/价格
    - name: "Google News - Huawei HONOR Imaging China"
      category: "oem"
      query: "(华为 OR 荣耀 OR Huawei OR HONOR) (影像技术 OR 影像系统 OR 影像算法 OR 传感器 OR 计算摄影 OR ISP OR 潜望 OR 可变光圈 OR XMAGE OR AI影像 OR 光学防抖 OR 相位对焦 OR 多摄) when:7d -评测 -对比 -榜单 -推荐 -降价 -样张 -实拍 -体验 -开箱 -价格"
      hl: "zh-CN"
      gl: "CN"
      ceid: "CN:zh-Hans"

    - name: "Google News - Xiaomi OPPO vivo Imaging China"
      category: "oem"
      query: "(小米 OR OPPO OR vivo OR Xiaomi) (影像技术 OR 影像系统 OR 影像算法 OR 传感器 OR 计算摄影 OR ISP OR 潜望 OR 可变光圈 OR 蓝图影像 OR AI影像 OR 徕卡 OR 哈苏 OR 蔡司 OR LYTIA OR LOFIC OR 光学防抖) when:7d -评测 -对比 -榜单 -推荐 -降价 -样张 -实拍 -体验 -开箱 -价格"
      hl: "zh-CN"
      gl: "CN"
      ceid: "CN:zh-Hans"

    - name: "Google News - OEM Imaging Tech China"
      category: "oem"
      query: "(华为 OR 小米 OR OPPO OR vivo OR 荣耀 OR 苹果 OR 三星 OR Xiaomi) (影像技术 OR 传感器技术 OR ISP OR 计算摄影 OR 潜望 OR 可变光圈 OR LYTIA OR LOFIC OR ISOCELL OR 图像传感器 OR 堆叠传感器 OR 感光元件) when:7d -评测 -对比 -榜单 -推荐 -降价 -样张 -实拍 -体验 -开箱 -价格"
      hl: "zh-CN"
      gl: "CN"
      ceid: "CN:zh-Hans"

    # 传感器供应商 / 上游技术
    - name: "Google News - Mobile Sensor Vendors"
      category: "oem"
      query: "(Sony LYTIA OR Samsung ISOCELL OR OmniVision) (smartphone camera sensor OR image sensor OR stacked sensor OR HDR OR LOFIC OR sensor architecture OR pixel binning) when:7d -review -comparison -price"

