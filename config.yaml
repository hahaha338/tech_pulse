# =================== External Trends ===================
external:
  # 只看最近内容，避免混入旧新闻、旧发布、榜单、旧评测
  lookback_days: 7
  max_items_per_source: 5
  max_items_total: 30
  max_report_items_per_section: 10

  tech_keywords:
    - "mobile imaging"
    - "computational photography"
    - "image sensor"
    - "camera sensor"
    - "HDR"
    - "autofocus"
    - "AI imaging"
    - "neural ISP"
